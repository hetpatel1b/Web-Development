<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>

<body>

    <ul>
        <li><b>Milk</b></li>
        <li>Butter</li>
        <li>Panner</li>
        <li>Bread</li>
        <li>Jam</li>
    </ul>

    <ol type="A">
        <li><b>>Milk</b></li>
        <li>Butter</li>
        <li>Panner</li>
        <li>Bread</li>
        <li>Jam</li>
    </ol>

</body>

</html>
